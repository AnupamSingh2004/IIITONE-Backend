name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iiitone
          POSTGRES_PASSWORD: iiitone
          POSTGRES_DB: iiitone
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U iiitone"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
      - run: gofmt -l . | tee /tmp/fmt-out; test ! -s /tmp/fmt-out
      - run: go build ./...
      - run: go vet ./...
      - name: Run migrations
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path ./migrations -database "postgres://iiitone:iiitone@localhost:5432/iiitone?sslmode=disable" up
      - name: Test
        env:
          DATABASE_URL: postgres://iiitone:iiitone@localhost:5432/iiitone?sslmode=disable
        run: go test ./... -v
